on:
  workflow_call:
    inputs:
      ios:
        default: "^18"
        required: false
        type: string
      xcode:
        default: "^16"
        required: false
        type: string
      macos:
        default: macos-latest
        required: false
        type: string
      is_pr:
        type: boolean
        default: false
    secrets:
      TEST_CREDENTIALS:
        required: true
      CODECOV_TOKEN:
        required: true

permissions:
  contents: read
  pull-requests: write

jobs:
  test-ios:
    runs-on: ${{ inputs.macos }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        if: ${{ inputs.is_pr }}
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        if: ${{ ! inputs.is_pr }}
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}
      - name: Install Dependencies
        env:
          TEST_CREDENTIALS: ${{ secrets.TEST_CREDENTIALS }}
        run: |
          brew install gnu-sed
          npm install -g typescript
          cd iosTests
          ./prepareios.js
          ./create_test_credentials_from_env.js
      - uses: mxcl/xcodebuild@d3ee9b419c1be9a988086c58fe0988f32d99cfc5  # v3.6.0
        id: xcodebuild
        with:
          xcode: ${{ inputs.xcode }}
          platform: iOS
          platform-version: ${{ inputs.ios }}
          workspace: iosTests/ios/SalesforceReactTestApp.xcworkspace
          scheme: "SalesforceReactTestApp"
          code-coverage: true
          verbosity: xcbeautify
      - name: Archive xcodebuild logs on build failure
        if: failure() && steps.xcodebuild.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: xcodebuild-logs-rn-ios${{ inputs.ios }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/Build/*.xcactivitylog
          if-no-files-found: ignore
          retention-days: 14
      - name: Parse test results
        if: success() || failure()
        env:
          IOS: ${{ inputs.ios }}
        run: |
          brew install xcresultparser
          xcresultparser -o junit test.xcresult > "test-results-ios${IOS}.xml"
      - name: Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: success() || failure()
        with:
          check_name: iOS ${{ inputs.ios }} Test Results
          job_name: iOS ${{ inputs.ios }} Test Results
          require_tests: true
          include_empty_in_summary: false
          simplified_summary: true
          detailed_summary: true
          comment: true
          job_summary: ${{ steps.xcodebuild.outcome == 'failure' }}
          report_paths: 'test-results-ios${{ inputs.ios }}.xml'
      - uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4.6.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        if: success() || failure()
      - name: Upload test results artifact
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: test-results-ios${{ inputs.ios }}
          path: test-results-ios${{ inputs.ios }}.xml
