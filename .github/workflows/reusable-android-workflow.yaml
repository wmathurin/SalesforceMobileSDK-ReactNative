on:
  workflow_call:
    inputs:
      is_pr:
        type: boolean
        default: false
    secrets:
      TEST_CREDENTIALS:
        required: true
      GCLOUD_SERVICE_KEY:
        required: true

permissions:
  contents: read

jobs:
  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        if: ${{ inputs.is_pr }}
        with:
          persist-credentials: false
          fetch-depth: 100
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        if: ${{ ! inputs.is_pr }}
        with:
          persist-credentials: false
          ref: ${{ github.head_ref }}
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 20
      - name: Install Dependencies
        env:
          TEST_CREDENTIALS: ${{ secrets.TEST_CREDENTIALS }}
        run: |
          npm install -g typescript
          cd androidTests
          ./prepareandroid.js
          ./create_test_credentials_from_env.js
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9  # v4.8.0
        with:
          distribution: 'zulu'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407  # v3.2.2
      - uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1  # v4.4.4
        with:
          gradle-version: "8.14.3"
          add-job-summary: on-failure
      - name: Build for Testing
        id: build
        run: |
          mkdir -p build_logs
          set -o pipefail
          cd androidTests/android
          ./gradlew :app:assembleDebug :app:assembleAndroidTest 2>&1 | tee "../../build_logs/build.log"
      - name: Archive build logs on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-logs-rn-android
          path: build_logs/
          if-no-files-found: ignore
          retention-days: 14
      - uses: 'google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed'  # v2.1.13
        if: success() || failure()
        with:
          credentials_json: '${{ secrets.GCLOUD_SERVICE_KEY }}'
      - uses: 'google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f'  # v2.2.1
        if: success() || failure()
      - name: Run Tests on Firebase Test Lab
        if: success() || failure()
        run: |
          APP_APK="androidTests/android/app/build/outputs/apk/debug/app-debug.apk"
          TEST_APK="androidTests/android/app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk"
          gcloud firebase test android run \
            --type instrumentation \
            --app "$APP_APK" \
            --test "$TEST_APK" \
            --device model=Pixel2,version=33 \
            --timeout 10m \
            --results-bucket cloud-test-${GITHUB_REPOSITORY_OWNER} \
            --results-dir "SalesforceReactNative/${GITHUB_RUN_ID}" \
            --no-record-video
      - name: Copy Test Results
        if: success() || failure()
        run: |
          BUCKET_PATH="gs://cloud-test-${GITHUB_REPOSITORY_OWNER}/SalesforceReactNative/${GITHUB_RUN_ID}"
          mkdir -p firebase_results
          gsutil -m cp -r "${BUCKET_PATH}/*/test_result_*.xml" firebase_results/ 2>/dev/null || true
      - name: Test Report
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d  # v6.4.1
        if: success() || failure()
        with:
          check_name: Android Test Results
          require_tests: true
          fail_on_failure: true
          report_paths: 'firebase_results/**.xml'
      - name: Archive Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: success() || failure()
        with:
          name: test-results-android
          path: 'firebase_results/**.xml'
