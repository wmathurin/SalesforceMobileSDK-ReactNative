pluginManagement {
    includeBuild("../node_modules/@react-native/gradle-plugin")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
plugins { id("com.facebook.react.settings") }
extensions.configure(com.facebook.react.ReactSettingsExtension) { ex -> ex.autolinkLibrariesFromCommand() }

rootProject.name = 'SalesforceReactTests'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')

// Include react-native-force android library (autolinked, but needs composite build
// so its MobileSync dependency can be resolved from the Android SDK clone)
include ':react-native-force'
project(':react-native-force').projectDir = new File(rootProject.projectDir, '../node_modules/react-native-force/android')

// Include Android SDK libraries from mobile_sdk clone
def androidSdkRoot = new File(rootProject.projectDir, '../mobile_sdk/SalesforceMobileSDK-Android')
if (androidSdkRoot.exists()) {
    includeBuild(androidSdkRoot) {
        dependencySubstitution {
            substitute(module('com.salesforce.mobilesdk:SalesforceSDK')).using(project(':libs:SalesforceSDK'))
            substitute(module('com.salesforce.mobilesdk:SalesforceAnalytics')).using(project(':libs:SalesforceAnalytics'))
            substitute(module('com.salesforce.mobilesdk:SmartStore')).using(project(':libs:SmartStore'))
            substitute(module('com.salesforce.mobilesdk:MobileSync')).using(project(':libs:MobileSync'))
        }
    }
}
